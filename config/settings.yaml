    from_address: ""                 # Se lee de .env (SMTP_FROM)
  whatsapp:
    provider: "twilio"              # twilio | business_api
    enabled: false
    # Credenciales en .env (TWILIO_SID, TWILIO_TOKEN, TWILIO_FROM)
  recipients:
